<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>4CGT — Redirecting</title>
<script>
// SPA fallback: redirect all paths to index.html with hash routing
var path = window.location.pathname;
if (path && path !== '/' && path !== '/index.html') {
  window.location.replace('/#' + path);
} else {
  window.location.replace('/');
}
</script>
</head>
<body></body>
</html>
